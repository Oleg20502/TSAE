# TSAE – environment for Pascal GPUs (e.g. GTX 1080 Ti).
# Install: pip install -e ".[pascal]"  (see README or use constraints below)
#
# On Pascal: use fp16: true, bf16: false in train configs (no native bf16).
# Avoid torch.compile(); use stock Trainer. CUDA 11.8 wheels recommended for torch.

[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.backends._legacy:_Backend"

[project]
name = "tsae"
version = "0.1.0"
description = "Text Semantic AutoEncoder – a 2-stage generative latent framework for text"
readme = "README.md"
requires-python = ">=3.10"
license = {text = "MIT"}

# Pinned for Pascal (1080 Ti): PyTorch 2.0–2.2 + CUDA 11.8 is well-tested; avoid newest to reduce CUDA/arch issues.
# DeepSpeed: optional upper bound; run ds_report on the server and relax if needed.
dependencies = [
    "torch>=2.0,<2.3",
    "transformers>=4.35,<4.46",
    "datasets>=2.16",
    "peft",
    "accelerate",
    "deepspeed>=0.12,<0.15",
    "sentence-transformers>=2.3",
    "pyyaml>=6.0",
    "dacite>=1.8",
    "editdistance>=0.6",
    "evaluate>=0.4",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.4",
    "ruff>=0.2",
]

[tool.setuptools.packages.find]
where = ["."]
include = ["src*"]

[tool.ruff]
line-length = 120
target-version = "py310"

[tool.pytest.ini_options]
testpaths = ["tests"]

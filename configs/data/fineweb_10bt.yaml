# FineWeb sample-10BT: preprocess with GPT-2 token chunking.
# Run prepare_dataset.py first; then set data.preprocessed_dir in train config.
data:
  dataset_name: HuggingFaceFW/fineweb
  dataset_config: sample-10BT
  text_column: text
  max_length: 128
  chunk_size_tokens: 128   # chunk each document into 128 GPT-2 tokens
  gpt2_tokenizer_name: gpt2
  num_train_samples: null  # use all chunks after preprocessing
  num_val_samples: 2000
  seed: 42
  preprocessed_dir: data/fineweb_10bt_prepared
  # Max documents to process before chunking (prepare_dataset); null = process full split
  max_articles_for_paragraph_split: null
  prepare_num_proc: 8
  prepare_paragraph_batch_size: 2000

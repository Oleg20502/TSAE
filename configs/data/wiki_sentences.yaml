data:
  dataset_name: wikimedia/wikipedia
  dataset_config: "20231101.en"
  text_column: text
  max_length: 16
  num_train_samples: 100000
  num_val_samples: 2000
  seed: 42
  preprocessed_dir: data/wiki_prepared
  # Optional: limit articles before paragraph split (used only by prepare_dataset; default 100_000)
  max_articles_for_paragraph_split: 100000000
  prepare_num_proc: 16
  prepare_paragraph_batch_size: 10000

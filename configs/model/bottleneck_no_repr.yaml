model:
  # Backbone (frozen, semantic loss target only)
  backbone_name: "sentence-transformers/nli-bert-base"
  freeze_repr: true

  d_latent: 768
  d_model: 768
  n_latent_tokens: 4
  max_length: 16
  
  # Encoder
  encoder_layers: 6
  encoder_heads: 12
  encoder_ff_dim: 3072
  encoder_dropout: 0.1

  # Decoder
  decoder_layers: 6
  decoder_heads: 12
  decoder_ff_dim: 3072
  decoder_dropout: 0.1

  # Latent augmentation
  noise_std: 0.1
  feature_dropout_p: 0.1

  # Loss
  lambda_sem: 0.5

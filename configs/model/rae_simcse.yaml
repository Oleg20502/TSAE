model:
  backbone_name: "princeton-nlp/sup-simcse-bert-base-uncased"
  freeze_repr: true

  # Latent dimensions
  d_sem: 256
  d_det: 256
  n_detail_tokens: 8

  # Detail encoder
  detail_encoder_layers: 2
  detail_encoder_heads: 4

  # Decoder
  decoder_layers: 4
  decoder_heads: 4
  decoder_dim: 256
  decoder_ff_dim: 512
  decoder_dropout: 0.1
  max_decoder_length: 128

  # Loss
  lambda_sem: 0.2

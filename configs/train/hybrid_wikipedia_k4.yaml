# Train hybrid latent on preprocessed Wikipedia-style LM data (max_latent_steps=4).
# 1) Run: python scripts/prepare_hybrid_lm_dataset.py --output_dir outputs/hybrid_lm/wiki_k4 --max_latent_steps 4 --ae_config_path <same as model.ae_config_path> ...
# 2) Point data.preprocessed_dir at that folder.

model:
  ae_config_path: "/home/okashurin/okashurin/TSAE/outputs/vavae_mpnet_nl_1_std_0.2_sl_10/config.yaml"
  ae_checkpoint_path: /home/okashurin/okashurin/TSAE/outputs/vavae_mpnet_nl_1_std_0.2_sl_10/checkpoint-925000/model.safetensors
  pretrained_gpt2: "openai-community/gpt2"
  max_model_seq_len: null
  lambda_mse: 10.0
  lambda_answer_ce: 1.0

train:
  output_dir: "outputs/hybrid_latent/wiki_k4/"
  init_from_checkpoint: null
  lr: 1.0e-5
  weight_decay: 0.001
  ema_decay: 0.9999
  epochs: 1
  warmup_steps: 100
  batch_size: 8
  gradient_accumulation_steps: 4
  max_grad_norm: 1.0
  logging_steps: 10
  eval_steps: 500
  save_steps: 500
  save_total_limit: 2
  fp16: false
  bf16: true
  dataloader_num_workers: 8
  seed: 42
  report_to: tensorboard
  metric_for_best_model: null

data:
  preprocessed_dir: "outputs/hybrid_lm/wiki_k4"
  prompt_min_len: 32
  prompt_max_len: 96
  completion_min_len: 1
  completion_max_len: 4
  reasoning_trigger: "!!!!"
  end_of_thinking_phrase: "end of thinking"
  gpt2_tokenizer_name: "openai-community/gpt2"
  max_prompt_tokens: 128
  max_answer_tokens: 16
  max_cot_steps: 4
  num_train_samples: null
  num_val_samples: 10000
  seed: 42

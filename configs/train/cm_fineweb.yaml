# Concept Model training config — custom scratch transformer variant.
#
# Operates in the latent space of a trained bottleneck AE.
# The AE encoder and decoder are frozen during CM training.
#
# To use a pretrained backbone instead (e.g. GPT-2), set:
#   model.cm_type: "gpt2"   # or "gpt2-medium", "gpt2-large", etc.

model:
  # ---- Frozen AE to load ----
  # Point these at a trained bottleneck AE checkpoint.
  ae_config_path: "configs/train/ae_mpnet_fineweb_noise.yaml"
  ae_checkpoint_path: "outputs/noise/nl_4_rstd_0.1_sl_10/final/model.safetensors"

  # ---- Concept Model type ----
  # "custom"  → scratch transformer (RoPE + RMSNorm + SwiGLU, block-level causal)
  # "<hf-name>" → pretrained HuggingFace causal-LM (e.g. "gpt2"), fully fine-tuned,
  #               standard token-level causal masking
  cm_type: "custom"

  # ---- Custom CM architecture ----
  # d_model can differ from the AE d_ae; linear projections are added automatically.
  d_model: 768
  n_heads: 12
  n_layers: 6
  ff_dim: 3072
  rope_base: 10000.0
  dropout: 0.1

  # ---- Loss ----
  lambda_mse: 0.1

train:
  output_dir: "outputs/concept_model/cm_custom_d768"
  lr: 1.0e-4
  weight_decay: 0.01
  ema_decay: 0.999
  epochs: 10
  warmup_steps: 500
  batch_size: 16          # sequences of N chunks each; effective GPU memory = batch_size * N * max_length
  gradient_accumulation_steps: 4
  max_grad_norm: 1.0
  logging_steps: 100
  eval_steps: 1000
  save_steps: 1000
  save_total_limit: 3
  fp16: false
  bf16: false
  dataloader_num_workers: 8
  seed: 42
  report_to: tensorboard

data:
  # Same pre-chunked FineWeb directory used for AE training.
  preprocessed_dir: "/home/okashurin/okashurin/datasets/fineweb_10bt_chunks"
  # Number of consecutive AE chunks grouped into one CM training sequence.
  # CM sees n_chunks * n_latent_tokens = 64 * 4 = 256 latent tokens per sequence.
  n_chunks: 64
  text_column: "text"
  num_val_samples: 1000
  seed: 42
  dataloader_num_workers: 8

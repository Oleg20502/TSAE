model:
  ae_config_path: "configs/train/ae_mpnet_fineweb_noise.yaml"
  ae_checkpoint_path: "outputs/noise/nl_4_rstd_0.1_sl_10/final/model.safetensors"

  cm_type: "custom"

  d_model: 768
  n_heads: 12
  n_layers: 6
  ff_dim: 3072
  rope_base: 10000.0
  dropout: 0.1

  lambda_mse: 0.1

train:
  output_dir: "outputs/concept_model/cm_custom_d768"
  lr: 1.0e-4
  weight_decay: 0.01
  ema_decay: 0.9999
  epochs: 100
  warmup_steps: 1000
  batch_size: 8
  gradient_accumulation_steps: 4
  max_grad_norm: 1.0
  logging_steps: 100
  eval_steps: 1000
  save_steps: 1000
  save_total_limit: 2
  fp16: false
  bf16: false
  dataloader_num_workers: 16
  seed: 42
  report_to: tensorboard

data:
  # Pre-processed CM sequences (built by prepare_cm_dataset.py).
  # Each row contains n_chunks consecutive chunks from the same FineWeb document.
  preprocessed_dir: "/home/okashurin/okashurin/datasets/fineweb_cm_sequences_n64"

  n_chunks: 32
  chunk_size_tokens: 16
  gpt2_tokenizer_name: gpt2
  text_column: "text"
  num_val_samples: 1000
  seed: 42

model:
  backbone_name: "sentence-transformers/all-mpnet-base-v2"
  freeze_repr: true
  d_model: 768
  n_latent_tokens: 1
  max_length: 16
  encoder_layers: 6
  encoder_heads: 12
  encoder_ff_dim: 3072
  encoder_dropout: 0.1
  decoder_type: "autoregressive"
  decoder_layers: 6
  decoder_heads: 12
  decoder_ff_dim: 3072
  decoder_dropout: 0.1
  noise_std: 0.05
  sigma_type: "rel"
  feature_dropout_p: 0.0
  lambda_sem: 0.0

train:
  output_dir: outputs/ae/nl_1_rstd_0.05
  lr: 1.0e-4
  weight_decay: 0.01
  epochs: 100
  warmup_steps: 1000
  batch_size: 256
  gradient_accumulation_steps: 1
  max_grad_norm: 1.0
  logging_steps: 100
  eval_steps: 1000
  save_steps: 1000
  save_total_limit: 2
  metric_for_best_model: eval/loss
  greater_is_better: null
  fp16: false
  bf16: True
  dataloader_num_workers: 16
  seed: 42
  report_to: tensorboard

data:
  preprocessed_dir: datasets/fineweb_10bt_chunks
  num_train_samples: null
  num_val_samples: null
  seed: 42

train:
  output_dir: outputs/bottleneck_no_repr
  lr: 1.0e-4
  weight_decay: 0.01
  epochs: 1000
  warmup_steps: 1000
  batch_size: 32
  gradient_accumulation_steps: 4
  logging_steps: 100
  eval_steps: 1000
  save_steps: 1000
  save_total_limit: 3
  fp16: false
  bf16: false
  dataloader_num_workers: 16
  seed: 42
  report_to: tensorboard

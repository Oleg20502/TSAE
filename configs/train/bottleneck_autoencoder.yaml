train:
  output_dir: outputs/bottleneck
  lr: 1.0e-4
  weight_decay: 0.01
  epochs: 5
  warmup_steps: 500
  batch_size: 4
  gradient_accumulation_steps: 2
  logging_steps: 50
  eval_steps: 500
  save_steps: 1000
  save_total_limit: 3
  fp16: false
  bf16: false
  dataloader_num_workers: 4
  seed: 42
  report_to: tensorboard

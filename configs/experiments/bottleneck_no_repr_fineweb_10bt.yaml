# Full experiment config: Bottleneck no repr (NLI-BERT) + FineWeb 10BT
# Run: scripts/train_bottleneck_no_repr.py --config configs/experiments/bottleneck_no_repr_fineweb_10bt.yaml

model:
  backbone_name: "sentence-transformers/nli-bert-base"
  freeze_repr: true
  d_latent: 768
  d_model: 768
  n_latent_tokens: 4
  max_length: 16
  encoder_layers: 6
  encoder_heads: 12
  encoder_ff_dim: 3072
  encoder_dropout: 0.1
  decoder_layers: 6
  decoder_heads: 12
  decoder_ff_dim: 3072
  decoder_dropout: 0.1
  noise_std: 0.1
  feature_dropout_p: 0.1
  lambda_sem: 0.5

train:
  output_dir: outputs/bottleneck_no_repr_test
  lr: 1.0e-4
  weight_decay: 0.01
  epochs: 100
  warmup_steps: 1000
  batch_size: 64
  gradient_accumulation_steps: 4
  max_grad_norm: 1.0
  logging_steps: 5
  eval_steps: 50
  save_steps: 50
  save_total_limit: 3
  fp16: false
  bf16: false
  dataloader_num_workers: 16
  seed: 42
  report_to: tensorboard

data:
  preprocessed_dir: /home/okashurin/okashurin/datasets/fineweb_10bt_chunks
  max_length: 16
  num_train_samples: null
  num_val_samples: null
  seed: 42

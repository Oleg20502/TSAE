model:
  backbone_name: "sentence-transformers/all-mpnet-base-v2"
  freeze_repr: true
  
  n_latent_tokens: 2
  max_length: 16
  noise_std: 0.2
  feature_dropout_p: 0.0
  lambda_sem: 10

  d_latent: 768
  d_model: 768

  # encoder
  encoder_layers: 6
  encoder_heads: 12
  encoder_ff_dim: 3072
  encoder_dropout: 0.1
  
  # decoder
  decoder_layers: 6
  decoder_heads: 12
  decoder_ff_dim: 3072
  decoder_dropout: 0.1

train:
  output_dir: outputs/vavae_mpnet_nl_2_std_0.2_sl_10
  lr: 1.0e-4
  weight_decay: 0.01
  epochs: 100
  warmup_steps: 1000
  batch_size: 32
  gradient_accumulation_steps: 4
  max_grad_norm: 1.0
  logging_steps: 100
  eval_steps: 1000
  save_steps: 1000
  save_total_limit: 2
  fp16: false
  bf16: false
  dataloader_num_workers: 16
  seed: 42
  report_to: tensorboard

data:
  preprocessed_dir: /home/okashurin/okashurin/datasets/fineweb_10bt_chunks
  max_length: 16
  num_train_samples: null
  num_val_samples: null
  seed: 42
